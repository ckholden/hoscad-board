<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>HOSCAD — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #070a0f;
      color: #c8d0dc;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .label {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #4a5568;
      margin-bottom: 1.5rem;
    }
    .status {
      font-size: 1.1rem;
      color: #e2b14a;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }
    .msg {
      font-size: 0.85rem;
      color: #4a5568;
      line-height: 1.6;
    }
    .divider {
      width: 48px;
      height: 1px;
      background: #1e2530;
      margin: 1.5rem auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="label">HOSCAD / EMS Tracking</div>
    <div class="divider"></div>
    <div class="status">⬡ SYSTEM OFFLINE</div>
    <div class="msg">This system is temporarily offline.<br>Contact your supervisor for alternate procedures.</div>
  </div>
</body>
</html>
