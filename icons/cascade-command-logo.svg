<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Cascade Command — Dispatch System Logo -->
  <!-- Mountain peaks (Cascade Range silhouette) -->
  <g opacity=".95">
    <!-- Far peak (smaller, background) -->
    <polygon points="28,42 42,16 56,42" fill="#2a6a9a" opacity=".5"/>
    <!-- Snow cap far peak -->
    <polygon points="42,16 38,24 46,24" fill="#8ec0e4" opacity=".6"/>
    <!-- Main peak (center, tallest — Mt. Bachelor/South Sister) -->
    <polygon points="14,42 38,6 62,42" fill="#3a8cc4"/>
    <!-- Snow cap main peak -->
    <polygon points="38,6 31,18 45,18" fill="#c8e2f4"/>
    <!-- Ridge line -->
    <polygon points="50,42 60,28 72,42" fill="#2a6a9a" opacity=".6"/>
    <!-- Tree line silhouette -->
    <rect x="8" y="40" width="68" height="3" rx="1" fill="#1a4a6e" opacity=".4"/>
    <!-- Small fir trees -->
    <polygon points="12,40 14,34 16,40" fill="#1a5a3a" opacity=".5"/>
    <polygon points="20,40 22.5,33 25,40" fill="#1a5a3a" opacity=".6"/>
    <polygon points="56,40 58,35 60,40" fill="#1a5a3a" opacity=".5"/>
    <polygon points="64,40 66,34 68,40" fill="#1a5a3a" opacity=".5"/>
  </g>
  <!-- Text: CASCADE COMMAND -->
  <text x="82" y="24" font-family="Consolas,'Courier New',monospace" font-size="16" font-weight="900" letter-spacing=".08em" fill="#e0e8f0">CASCADE</text>
  <text x="82" y="42" font-family="Consolas,'Courier New',monospace" font-size="14" font-weight="700" letter-spacing=".12em" fill="#6a8eaa">COMMAND</text>
  <!-- Thin accent line -->
  <rect x="82" y="27" width="148" height="1" rx=".5" fill="#3a8cc4" opacity=".4"/>
</svg>